<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通話ルーム - WebRTC 音声通話</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="rooms.css">
  <link rel="stylesheet" href="room.css">
</head>
<body>
  <!-- テーマ切り替えボタン -->
  <button id="theme-toggle" class="theme-toggle" title="テーマ切り替え">
    <span class="material-icons">brightness_4</span>
  </button>

  <div class="room-container">
    <!-- ルーム情報とコントロール -->
    <div class="room-main">
      <header class="room-header">
        <div>
          <h1 id="room-name">読み込み中...</h1>
          <p id="room-info"><span id="user-name"></span></p>
        </div>
        <button id="back-btn" class="btn btn-secondary">
          <span class="material-icons">arrow_back</span>ルーム一覧に戻る
        </button>
      </header>

      <div class="call-section">
        <div class="call-status">
          <div id="status" class="status-disconnected">
            <span class="status-dot"></span>
            <span id="status-text">接続中...</span>
          </div>
        </div>

        <div class="controls">
          <button id="mute-btn" class="btn btn-control" title="ミュート">
            <span class="icon material-icons">mic</span>
            <span class="label">ミュート</span>
          </button>
          <button id="leave-btn" class="btn btn-danger" title="退出">
            <span class="icon material-icons">call_end</span>
            <span class="label">退出</span>
          </button>
        </div>

        <div id="participants" class="participants">
          <h3>参加者</h3>
          <div id="participants-list"></div>
        </div>
      </div>
    </div>

    <!-- チャットエリア -->
    <div class="chat-area">
      <div class="chat-header">
        <h3><span class="material-icons" style="vertical-align: middle; margin-right: 8px;">chat</span>チャット</h3>
      </div>

      <div id="chat-messages" class="chat-messages">
        <!-- メッセージがここに表示されます -->
      </div>

      <div class="chat-input-container">
        <input 
          type="file" 
          id="image-input" 
          accept="image/*" 
          style="display: none;"
        >
        <button id="image-btn" class="chat-btn" title="画像を送信">
          <span class="material-icons">image</span>
        </button>
        <input 
          type="text" 
          id="chat-input" 
          placeholder="メッセージを入力..."
          maxlength="500"
        >
        <button id="send-btn" class="chat-btn chat-btn-send" title="送信">
          <span class="material-icons">send</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 画像プレビューモーダル -->
  <div id="image-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content image-modal-content">
      <button id="image-modal-close" class="image-modal-close">✕</button>
      <img id="modal-image" src="" alt="画像プレビュー">
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="room.js"></script>
</body>
</html>
